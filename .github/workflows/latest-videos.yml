# Pulls the newest YouTube upload into the README's "Latest Video" section.
# Rewrites whatever sits between these markers in README.md:
#   <!-- YOUTUBE-VIDEOS-LIST:START -->
#   <!-- YOUTUBE-VIDEOS-LIST:END -->
name: Latest YouTube Videos

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:         # run manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest video into README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCE4QThxuTWNg1nSN_PlP2tw"
          comment_tag_name: "YOUTUBE-VIDEOS-LIST"
          max_post_count: 1                       # bump to 3-5 to show a list instead of just the newest
          template: "▶️ [$title]($url) &nbsp;<sub>$date</sub><br>"
          date_format: "yyyy-MM-dd"
          commit_message: "chore: update latest YouTube video"
