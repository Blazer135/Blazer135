# Renders the newest YouTube upload as a thumbnail card in the README's "Latest Video" section.
# Rewrites whatever sits between these markers in README.md:
#   <!-- YOUTUBE-CARDS:START -->
#   <!-- YOUTUBE-CARDS:END -->
name: Latest YouTube Videos

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:         # run manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render latest video card
        uses: DenverCoder1/github-readme-youtube-cards@main
        with:
          channel_id: UCE4QThxuTWNg1nSN_PlP2tw
          comment_tag_name: "YOUTUBE-CARDS"
          max_videos: 1                 # bump to show more recent videos
          card_width: 640               # wide, banner-style thumbnail card
          max_title_lines: 2
          background_color: "#0f172a"
          title_color: "#ffffff"
          stats_color: "#94a3b8"
          commit_message: "chore: update latest YouTube video card"
